name: Build Grave.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x ./modern/gradlew
      - run: cd modern && ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: grave-jar
          path: modern/build/libs/*.jar
          
